# ─── Decap CMS Configuration ──────────────────────────────────────────────────
# All content files live under public/ so they are deployed as static assets.
# The React app fetches them at runtime from /content/*.json
#
# ACTIVATION STEPS:
#   1. Netlify dashboard > Site settings > Identity > Enable Identity
#   2. Identity > Services > Enable Git Gateway
#   3. Identity > Registration > Set to "Invite only"
#   4. Invite the store owner: Identity > Users > Invite users
#   5. Uncomment site_url below with your live Netlify URL
#   6. Owner logs in at https://your-site.netlify.app/admin/
#
# LOCAL DEV: run `npx decap-server` in project root, then uncomment local_backend

backend:
  name: git-gateway
  branch: main

# local_backend: true

# site_url: https://rkboutique.netlify.app
# display_url: https://rkboutique.netlify.app

# Image uploads → public/images/uploads/ → served at /images/uploads/
media_folder: public/images/uploads
public_folder: /images/uploads

collections:

  # ── Brand, Hero & About ──────────────────────────────────────────────────
  # Written to: public/content/site.json → served at /content/site.json
  - name: site_settings
    label: Site Settings
    files:

      - name: general
        label: Brand, Hero & About
        file: public/content/site.json
        fields:
          - label: Brand Name
            name: brandName
            widget: string
            hint: "Shown in the navbar and footer"

          - label: Tagline
            name: tagline
            widget: string
            hint: "Short descriptor under the logo, e.g. Designer Ethnic & Indo-Western Fashion"

          - label: Hero Headline
            name: heroHeadline
            widget: text
            hint: "Main hero title. Use a newline to split into two lines."

          - label: Hero Subtext
            name: heroSubtext
            widget: text
            hint: "Supporting sentence shown under the hero headline"

          - label: About Section Label
            name: aboutTitle
            widget: string
            hint: "Small eyebrow label above the heading, e.g. Our Story"

          - label: About Body Paragraphs
            name: aboutBody
            widget: list
            summary: "{{fields.paragraph}}"
            field:
              label: Paragraph
              name: paragraph
              widget: text

          - label: About Pull Quote
            name: aboutQuote
            widget: string
            hint: "Italic blockquote shown in the About section"

          - label: Instagram Bio
            name: instagramBio
            widget: text
            hint: "Short brand description shown in the Social section"

      # ── Contact Details ────────────────────────────────────────────────
      # Written to: public/content/contact.json → served at /content/contact.json
      - name: contact
        label: Contact Details
        file: public/content/contact.json
        fields:
          - label: Phone Number
            name: phone
            widget: string
            hint: "Digits only, no spaces, e.g. 9867426461"

          - label: WhatsApp Number
            name: whatsapp
            widget: string
            hint: "Full international format, e.g. +919867426461. Used for the inquiry cart."

          - label: Store Address
            name: address
            widget: text
            hint: "Full postal address shown in the contact section and footer"

          - label: Google Maps URL
            name: mapsUrl
            widget: string
            hint: "Paste the full Google Maps share link"

          - label: Instagram URL
            name: instagramUrl
            widget: string
            hint: "Full URL, e.g. https://www.instagram.com/rkboutique9/"

          - label: Instagram Handle
            name: instagramHandle
            widget: string
            hint: "Include the @ symbol, e.g. @rkboutique9"

  # ── Collection Cards ─────────────────────────────────────────────────────
  # Written to: public/content/categories/{casual,party,wedding}.json
  - name: categories
    label: Collection Cards
    files:

      - name: casual
        label: Casual Collection Card
        file: public/content/categories/casual.json
        fields:
          - { label: Title, name: title, widget: string }
          - label: Description
            name: description
            widget: text
            hint: "One or two sentences shown on the card"

      - name: party
        label: Party Wear Collection Card
        file: public/content/categories/party.json
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }

      - name: wedding
        label: Wedding Collection Card
        file: public/content/categories/wedding.json
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text }

  # ── Gallery Items ─────────────────────────────────────────────────────────
  # Content written to: public/content/gallery/RK-CAS-01.json etc.
  # Images stored at:   public/images/gallery/ (where all gallery photos already live)
  # Image paths in JSON resolve to: /images/gallery/filename.jpg
  - name: gallery
    label: Gallery
    label_singular: Gallery Item
    folder: public/content/gallery
    create: true
    format: json
    slug: "{{fields.code}}"
    summary: "{{fields.code}} | {{fields.title}} ({{fields.category}})"
    sortable_fields: ["sortOrder", "title", "category", "code"]
    media_folder: public/images/gallery
    public_folder: /images/gallery
    fields:
      - label: Internal ID
        name: id
        widget: string
        hint: "Unique lowercase slug, e.g. cas-01"

      - label: Title
        name: title
        widget: string
        hint: "Display name on the gallery card and inquiry cart"

      - label: Category
        name: category
        widget: select
        options:
          - { label: "Casual", value: casual }
          - { label: "Party Wear", value: party }
          - { label: "Wedding", value: wedding }

      - label: Image
        name: image
        widget: image
        hint: "Uploads go to public/images/gallery/. Existing images are already there."

      - label: Item Code
        name: code
        widget: string
        hint: "Reference code sent in the WhatsApp inquiry, e.g. RK-CAS-01"

      - label: Description
        name: description
        widget: text
        hint: "Short product description shown in the lightbox"

      - label: Available
        name: available
        widget: boolean
        default: true
        hint: "Uncheck to hide this item from the public gallery"

      - label: Sort Order
        name: sortOrder
        widget: number
        value_type: int
        min: 1
        default: 1
        hint: "Controls display order within the same category. Lower number appears first."

  # ── Customer Reviews ──────────────────────────────────────────────────────
  # Written to: public/content/testimonials/{id}.json
  - name: testimonials
    label: Customer Reviews
    label_singular: Review
    folder: public/content/testimonials
    create: true
    format: json
    slug: "{{fields.id}}"
    summary: "{{fields.name}} | {{fields.rating}} stars"
    fields:
      - label: Internal ID
        name: id
        widget: string
        hint: "Unique slug, e.g. vanita-kandhari"

      - label: Customer Name
        name: name
        widget: string

      - label: Star Rating
        name: rating
        widget: number
        value_type: int
        min: 1
        max: 5
        default: 5

      - label: Review Text
        name: review
        widget: text

      - label: Google Maps Review URL
        name: reviewUrl
        widget: string
        required: false
        hint: "Optional. Links to the original Google Maps review."

  # ── Why Choose Us Points ──────────────────────────────────────────────────
  # Written to: public/content/why-us/{id}.json
  - name: why_us
    label: Why Choose Us
    label_singular: Feature Point
    folder: public/content/why-us
    create: true
    format: json
    slug: "{{fields.id}}"
    summary: "{{fields.title}}"
    fields:
      - label: Internal ID
        name: id
        widget: string
        hint: "Unique slug, e.g. curated, affordable, alterations"

      - label: Icon
        name: icon
        widget: select
        hint: "Lucide React icon rendered on the feature card"
        options:
          - { label: "Sparkles (curated / quality)", value: Sparkles }
          - { label: "Tag (pricing / value)", value: Tag }
          - { label: "Calendar (occasions)", value: Calendar }
          - { label: "Scissors (alterations)", value: Scissors }
          - { label: "Layers (variety / fabrics)", value: Layers }
          - { label: "Heart (personal service)", value: Heart }
          - { label: "Star (excellence)", value: Star }
          - { label: "Award (trust)", value: Award }
          - { label: "Gift (gifting)", value: Gift }
          - { label: "MapPin (location)", value: MapPin }
          - { label: "ShoppingBag (shopping)", value: ShoppingBag }
          - { label: "Zap (speed)", value: Zap }

      - label: Title
        name: title
        widget: string
        hint: "Short bold heading on the card, e.g. Expertly Curated"

      - label: Description
        name: description
        widget: text
        hint: "Two to three sentences explaining this point"
