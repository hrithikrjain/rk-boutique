# Decap CMS Configuration
# All content files live under public/ — deployed as static assets.
# The React app reads them at runtime from /content/*.json
#
# ACTIVATION STEPS:
#   1. Netlify dashboard > Site settings > Identity > Enable Identity
#   2. Identity > Services > Enable Git Gateway
#   3. Identity > Registration > Set to "Invite only"
#   4. Invite the store owner: Identity > Users > Invite users
#   5. Uncomment site_url below with your live Netlify URL
#   6. Owner logs in at https://your-site.netlify.app/admin/
#
# LOCAL DEV: run `npx decap-server` in project root, then uncomment local_backend

backend:
  name: git-gateway
  branch: main

# local_backend: true

# site_url: https://rkboutique.netlify.app
# display_url: https://rkboutique.netlify.app

# Global fallback for non-gallery media uploads
media_folder: public/images/uploads
public_folder: /images/uploads

collections:

  # SITE SETTINGS
  # Writes to public/content/site.json and public/content/contact.json
  - name: site_settings
    label: Site Settings
    files:

      - name: general
        label: Brand, Hero and About
        file: public/content/site.json
        fields:
          - label: Brand Name
            name: brandName
            widget: string
            hint: "Shown in the navbar and footer"

          - label: Tagline
            name: tagline
            widget: string
            hint: "Short descriptor under the logo, e.g. Designer Ethnic and Indo-Western Fashion"

          - label: Hero Headline
            name: heroHeadline
            widget: text
            hint: "Main hero title. Use a newline to split into two lines."

          - label: Hero Subtext
            name: heroSubtext
            widget: text
            hint: "Supporting sentence shown under the hero headline"

          - label: About Section Label
            name: aboutTitle
            widget: string
            hint: "Small eyebrow label above the About heading, e.g. Our Story"

          - label: About Body Paragraphs
            name: aboutBody
            widget: list
            summary: "{{fields.paragraph}}"
            field:
              label: Paragraph
              name: paragraph
              widget: text

          - label: About Pull Quote
            name: aboutQuote
            widget: string
            hint: "Italic blockquote shown in the About section"

          - label: Instagram Bio
            name: instagramBio
            widget: text
            hint: "Short brand description shown in the Social section"

      - name: contact
        label: Contact Details
        file: public/content/contact.json
        fields:
          - label: Phone Number
            name: phone
            widget: string
            hint: "Digits only, no spaces, e.g. 9867426461"

          - label: WhatsApp Number
            name: whatsapp
            widget: string
            hint: "Full international format, e.g. +919867426461. Used for the inquiry cart."

          - label: Store Address
            name: address
            widget: text
            hint: "Full postal address shown in the contact section and footer"

          - label: Google Maps URL
            name: mapsUrl
            widget: string
            hint: "Paste the full Google Maps share link"

          - label: Instagram URL
            name: instagramUrl
            widget: string
            hint: "Full URL, e.g. https://www.instagram.com/rkboutique9/"

          - label: Instagram Handle
            name: instagramHandle
            widget: string
            hint: "Include the @ symbol, e.g. @rkboutique9"

  # COLLECTION CARDS
  # Writes to public/content/categories/casual.json, party.json, wedding.json
  - name: categories
    label: Collection Cards
    files:

      - name: casual
        label: Casual Collection Card
        file: public/content/categories/casual.json
        fields:
          - label: Title
            name: title
            widget: string
          - label: Description
            name: description
            widget: text
            hint: "One or two sentences shown on the card"

      - name: party
        label: Party Wear Collection Card
        file: public/content/categories/party.json
        fields:
          - label: Title
            name: title
            widget: string
          - label: Description
            name: description
            widget: text

      - name: wedding
        label: Wedding Collection Card
        file: public/content/categories/wedding.json
        fields:
          - label: Title
            name: title
            widget: string
          - label: Description
            name: description
            widget: text

  # GALLERY ITEMS
  # Writes to: public/content/gallery.json as { "items": [...] }
  # React app fetches /content/gallery.json and reads .items array
  # Images stored at: public/images/gallery/
  - name: gallery
    label: Gallery
    files:
      - name: gallery_items
        label: All Gallery Items
        file: public/content/gallery.json
        media_folder: /public/images/gallery
        public_folder: /images/gallery
        fields:
          - label: Items
            name: items
            widget: list
            summary: "{{fields.code}} | {{fields.title}} ({{fields.category}})"
            fields:
              - label: Internal ID
                name: id
                widget: string
                hint: "Unique lowercase slug, e.g. cas-01"

              - label: Title
                name: title
                widget: string
                hint: "Display name on the gallery card and in the inquiry cart"

              - label: Category
                name: category
                widget: select
                options:
                  - { label: "Casual", value: casual }
                  - { label: "Party Wear", value: party }
                  - { label: "Wedding", value: wedding }

              - label: Image
                name: image
                widget: image
                hint: "Uploads go to public/images/gallery/. Existing photos are already there."

              - label: Item Code
                name: code
                widget: string
                hint: "Reference code in the WhatsApp inquiry, e.g. RK-CAS-01"

              - label: Description
                name: description
                widget: text

              - label: Available
                name: available
                widget: boolean
                default: true
                hint: "Uncheck to hide from the public gallery"

              - label: Sort Order
                name: sortOrder
                widget: number
                value_type: int
                min: 1
                default: 1
                hint: "Lower number appears first within the same category"

  # CUSTOMER REVIEWS
  # Writes to: public/content/testimonials.json as { "items": [...] }
  - name: testimonials
    label: Customer Reviews
    files:
      - name: all_reviews
        label: All Reviews
        file: public/content/testimonials.json
        fields:
          - label: Reviews
            name: items
            widget: list
            summary: "{{fields.name}} | {{fields.rating}} stars"
            fields:
              - { label: Internal ID, name: id, widget: string }
              - { label: Customer Name, name: name, widget: string }
              - label: Star Rating
                name: rating
                widget: number
                value_type: int
                min: 1
                max: 5
                default: 5
              - { label: Review Text, name: review, widget: text }
              - label: Google Maps Review URL
                name: reviewUrl
                widget: string
                required: false
                hint: "Optional. Links to the original Google Maps review."

  # WHY CHOOSE US
  # Writes to: public/content/why-us.json as { "items": [...] }
  - name: why_us
    label: Why Choose Us
    files:
      - name: all_points
        label: All Feature Points
        file: public/content/why-us.json
        fields:
          - label: Points
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Internal ID, name: id, widget: string }
              - label: Icon
                name: icon
                widget: select
                options:
                  - { label: "Sparkles (curated / quality)", value: Sparkles }
                  - { label: "Tag (pricing / value)", value: Tag }
                  - { label: "Calendar (occasions)", value: Calendar }
                  - { label: "Scissors (alterations)", value: Scissors }
                  - { label: "Layers (variety / fabrics)", value: Layers }
                  - { label: "Heart (personal service)", value: Heart }
                  - { label: "Star (excellence)", value: Star }
                  - { label: "Award (trust)", value: Award }
                  - { label: "Gift (gifting)", value: Gift }
                  - { label: "MapPin (location)", value: MapPin }
                  - { label: "ShoppingBag (shopping)", value: ShoppingBag }
                  - { label: "Zap (speed)", value: Zap }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
