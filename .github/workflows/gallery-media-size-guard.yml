name: Gallery Media Size Guard

on:
  push:
    branches:
      - migrate-to-cloudflare
    paths:
      - public/images/gallery/**
      - public/content/**
      - scripts/prune-unused-gallery-images.mjs
      - .github/workflows/gallery-media-size-guard.yml
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MAX_GALLERY_MB: "100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate gallery folder size
        id: size
        shell: bash
        run: |
          set -euo pipefail
          threshold_bytes=$((MAX_GALLERY_MB * 1024 * 1024))

          if [ -d "public/images/gallery" ]; then
            size_bytes=$(find public/images/gallery -type f -printf "%s\n" | awk '{sum+=$1} END {print sum+0}')
          else
            size_bytes=0
          fi

          size_mb=$(awk -v s="$size_bytes" 'BEGIN {printf "%.2f", s/1024/1024}')
          threshold_mb=$(awk -v s="$threshold_bytes" 'BEGIN {printf "%.2f", s/1024/1024}')

          echo "size_bytes=$size_bytes" >> "$GITHUB_OUTPUT"
          echo "size_mb=$size_mb" >> "$GITHUB_OUTPUT"
          echo "threshold_bytes=$threshold_bytes" >> "$GITHUB_OUTPUT"
          echo "threshold_mb=$threshold_mb" >> "$GITHUB_OUTPUT"

          {
            echo "### Gallery Media Size"
            echo ""
            echo "- Current size: ${size_mb} MB"
            echo "- Threshold: ${threshold_mb} MB"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce size threshold
        shell: bash
        run: |
          set -euo pipefail
          size_bytes='${{ steps.size.outputs.size_bytes }}'
          threshold_bytes='${{ steps.size.outputs.threshold_bytes }}'
          size_mb='${{ steps.size.outputs.size_mb }}'
          threshold_mb='${{ steps.size.outputs.threshold_mb }}'

          if [ "$size_bytes" -gt "$threshold_bytes" ]; then
            echo "::error::Gallery folder is ${size_mb} MB which exceeds ${threshold_mb} MB."
            echo "::error::Run 'npm run media:prune:check' and 'npm run media:prune:write' locally, then commit cleanup."
            exit 1
          fi

          echo "Gallery media size is within the configured limit."
